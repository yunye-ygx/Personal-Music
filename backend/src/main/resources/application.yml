server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://192.168.100.128:5433/moodtune
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: 192.168.100.128
      port: 6380
      password:

  # Spring AI - 通义千问配置（使用OpenAI兼容格式）
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:sk-your-api-key-here}  # 通义千问的API Key
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1  # 通义千问OpenAI兼容端点
      chat:
        options:
          model: qwen-plus                                   # 模型: qwen-turbo(快/便宜) qwen-plus(推荐) qwen-max(最强) qwen-max-longcontext(长文本)
          temperature: 0.7                                   # 创造性 0-1，越高越随机
          top-p: 0.8                                         # 多样性控制
          max-tokens: 2000                                   # 最大输出token数

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.moodtune.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# MinIO Configuration
minio:
  endpoint: http://192.168.100.128:9002
  access-key: moodtune
  secret-key: moodtune123
  bucket-name: moodtune-songs

