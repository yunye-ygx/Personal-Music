version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: moodtune-postgres
    restart: always
    environment:
      POSTGRES_DB: moodtune
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: moodtune-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: moodtune-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: moodtune
      MINIO_ROOT_PASSWORD: moodtune123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data

  elasticsearch:
    image: elasticsearch:7.17.10
    container_name: moodtune-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: kibana:7.17.10
    container_name: moodtune-kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:
